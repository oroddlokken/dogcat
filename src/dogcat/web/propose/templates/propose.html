<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>dogcat &mdash; propose</title>
        <link rel="stylesheet"
              href="{{ url_for('static', path='css/propose.css') }}">
    </head>
    <body>
        <div class="wrap">
            <h1>
                <a href="/">dogcat <span>propose</span></a>
            </h1>

            {% if submitted %}
                <div class="msg msg--ok">
                    Proposal submitted: <strong>{{ proposal_id }}</strong> {{ proposal_title }}
                </div>
            {% endif %}

            {% if error %}<div class="msg msg--err">{{ error }}</div>{% endif %}

            <form method="post" action="/" id="propose-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <input type="hidden" id="namespace" name="namespace" value="{{ namespace }}">
                <div class="row field">
                    <div class="dropdown" id="ns-dropdown">
                        <div class="dropdown-toggle" id="ns-toggle" tabindex="0" role="button">{{ namespace }}</div>
                        <div class="dropdown-menu" id="ns-menu">
                            {% for ns in namespaces %}
                                <div class="dropdown-item{% if ns == namespace %} active{% endif %}"
                                     data-value="{{ ns }}">{{ ns }}</div>
                            {% endfor %}
                            {% if allow_creating_namespaces %}
                                <div class="dropdown-item dropdown-item--new" data-value="__new__">New&hellip;</div>
                            {% endif %}
                        </div>
                    </div>
                    <input type="text"
                           id="ns-custom"
                           name="ns_custom"
                           class="ns-custom hidden"
                           placeholder="New namespace"
                           autocomplete="off">
                    <input type="text"
                           id="title"
                           name="title"
                           required
                           placeholder="Title"
                           autocomplete="off">
                </div>
                <div class="field">
                    <textarea id="description" name="description" placeholder="Description"></textarea>
                </div>
                <button type="submit" id="submit-btn">Submit proposal</button>
            </form>

        </div>

        <script src="{{ url_for('static', path='js/propose.js') }}"></script>
    </body>
</html>
